<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export Claude Settings</title>
  <link rel="stylesheet" href="${stylesUri}">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Export Claude Settings</h1>
      <div class="empty-state" id="empty-state" style="display: none;">
        <p>No Claude resources found to export.</p>
        <p class="empty-state-hint">Make sure you have resources in your Claude configuration directories.</p>
      </div>
    </header>
    <div class="progress-container" id="progress-container" style="display: none;">
      <div class="progress-header">
        <span class="progress-status" id="progress-status">Preparing...</span>
        <span class="progress-percentage" id="progress-percentage">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-current" id="progress-current"></div>
    </div>

    <main class="main-content">
      <div class="tree-toolbar">
        <button class="tree-toolbar-btn" id="expand-all-btn" title="Expand all">Expand All</button>
        <button class="tree-toolbar-btn" id="collapse-all-btn" title="Collapse all">Collapse All</button>
        <div class="tree-stats">
          <span id="selected-count">0</span> / <span id="total-count">0</span> items selected
        </div>
      </div>
      <div class="tree-container" id="tree-container">
        <!-- Tree nodes will be dynamically generated -->
      </div>
    </main>

    <footer class="footer">
      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" id="export-to-directory" ${exportToDirectoryChecked} />
          <label for="export-to-directory">Export to directory</label>
        </div>
      </div>

      <div class="input-group input-indented" id="input-group">
        <label for="target-path">Local Path</label>
        <div class="input-wrapper">
          <input
            id="target-path"
            type="text"
            value="${targetPath}"
            placeholder="Enter a valid directory path"
          />
          <button class="browse-btn" id="browse-btn" title="Browse for folder">Browse...</button>
        </div>
      </div>

      <div class="button-group">
        <button class="cancel" id="cancel-btn">Cancel</button>
        <button class="confirm" id="export-btn">Export (<span id="export-count">0</span>)</button>
      </div>
    </footer>
  </div>

  <script src="${scriptUri}"></script>
</body>
</html>
