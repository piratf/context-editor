name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      draft_release:
        description: "Create as draft release"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run ESLint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npx semantic-release --dry-run
          else
            # For testing: allow release from this branch and optionally as draft
            # For test branch, only package vsix without publishing to marketplace
            node -e "
              const config = require('./.releaserc.json');
              config.branches = [config.branches[0], '${{ github.ref_name }}'];
              const githubPlugin = config.plugins.find(p => Array.isArray(p) && p[0] === '@semantic-release/github');
              if (githubPlugin && '${{ github.event.inputs.draft_release }}' === 'true') {
                githubPlugin[1] = githubPlugin[1] || {};
                githubPlugin[1].draftRelease = true;
              }
              // For test branch, set packageVsix to true and publishVsix to false
              const vscePlugin = config.plugins.find(p => p === 'semantic-release-vsce');
              if (vscePlugin) {
                config.plugins[config.plugins.indexOf(vscePlugin)] = ['semantic-release-vsce', { packageVsix: true, publishVsix: false, publishOvsx: false }];
              }
              fs.writeFileSync('.releaserc.json', JSON.stringify(config, null, 2));
            "
            # Format modified files to pass pre-push hook
            npx prettier --write .releaserc.json CHANGELOG.md
            npx semantic-release
          fi
